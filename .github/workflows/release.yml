name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: make test
      - name: Lint
        run: make lint
      - name: Build all platforms
        env:
          VERSION: ${{ github.ref_name }}
        run: make build-all VERSION="$VERSION"
      - name: Create archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd bin
          for dir in darwin-arm64 darwin-amd64 linux-amd64 linux-arm64; do
            tar -czf "yammm-lsp-${VERSION}-${dir}.tar.gz" -C "${dir}" yammm-lsp
          done
          for dir in windows-amd64 windows-arm64; do
            (cd "${dir}" && zip "../yammm-lsp-${VERSION}-${dir}.zip" yammm-lsp.exe)
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/yammm-lsp-${{ github.ref_name }}-darwin-arm64.tar.gz
            bin/yammm-lsp-${{ github.ref_name }}-darwin-amd64.tar.gz
            bin/yammm-lsp-${{ github.ref_name }}-linux-amd64.tar.gz
            bin/yammm-lsp-${{ github.ref_name }}-linux-arm64.tar.gz
            bin/yammm-lsp-${{ github.ref_name }}-windows-amd64.zip
            bin/yammm-lsp-${{ github.ref_name }}-windows-arm64.zip
